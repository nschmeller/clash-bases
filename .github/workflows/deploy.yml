name: CI / Deploy

# PRs run validate-bases + build (so contributors see the same
# checks main runs).  Only push to main (or a manual dispatch from
# main) actually deploys to GitHub Pages.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Per-ref so PR builds don't fight each other or the main-branch
  # deploy.  Cancel in-progress on PRs (rapid-pushed commits supersede
  # each other) but never on main (we want every push to actually
  # finish deploying).
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate-bases:
    uses: ./.github/workflows/validate-bases.yml

  build:
    needs: validate-bases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Install wasm-bindgen-cli
        uses: jetli/wasm-bindgen-action@v0.2.0
        with:
          version: latest

      - name: Build site
        run: trunk build --release --public-url "/${{ github.event.repository.name }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    # Only the main branch deploys.  The push trigger above is already
    # restricted to main, but workflow_dispatch can fire from any
    # branch -- the explicit ref check makes a fork's "Run workflow"
    # button on a feature branch a no-op rather than an unintended
    # deploy of half-finished work.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
